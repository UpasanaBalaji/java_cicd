name: Build Java App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compile Java
        run: javac Hello.java

      - name: Create JAR
        run: jar cfe Hello.jar Hello Hello.class